org.gradle.jvmargs=-Xmx4096m
android.useAndroidX=true
android.enableJetifier=true
# Flutter JARs are already AndroidX-compatible — exclude them from Jetifier
# to avoid JetifyTransform OOM on CI runners with limited heap.
android.jetifier.ignorelist=flutter_embedding_debug,armeabi_v7a_debug,x86_64_debug,arm64_v8a_debug,flutter_embedding_release,armeabi_v7a_release,x86_64_release,arm64_v8a_release,flutter_embedding_profile,armeabi_v7a_profile,x86_64_profile,arm64_v8a_profile
android.defaults.buildfeatures.buildconfig=true
android.nonTransitiveRClass=false
android.nonFinalResIds=false