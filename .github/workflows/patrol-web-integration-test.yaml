name: Patrol Web Integration Tests

on:
  # PR trigger disabled until all web integration tests are green.
  # Re-enable the `pull_request` block below once SSH git deps are
  # migrated to HTTPS and the test suite is stable.
  #
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "lib/**"
  #     - "integration_test/**"
  #     - "pubspec.yaml"
  #     - "pubspec.lock"
  #     - ".github/workflows/patrol-web-integration-test.yaml"
  workflow_dispatch:
    inputs:
      patrol_test_target:
        description: "Optional path to a single Patrol integration test Dart file. Leave empty to run the whole suite."
        required: false
        default: ""

jobs:
  patrol-web:
    name: Patrol Web (Chrome headless)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    env:
      FLUTTER_VERSION: "3.38.9"
      PATROL_CLI_VERSION: "4.3.1"
      SYNAPSE_URL: http://localhost
      SERVER_NAME: localhost

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Start Synapse (Docker)
        run: ./scripts/integration-server-synapse.sh

      - name: Provision fixtures
        id: fixtures
        run: |
          ./scripts/integration-test-provision-synapse.sh > .env.patrol-web
          # Log variable names without values (passwords are throwaway but
          # no reason to leak them in CI logs).
          cut -d= -f1 .env.patrol-web

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          dart pub global activate patrol_cli ${{ env.PATROL_CLI_VERSION }}

      - name: Run Patrol Web
        env:
          PATROL_TEST_TARGET: ${{ inputs.patrol_test_target }}
        run: |
          # shellcheck disable=SC1091
          set -a
          . ./.env.patrol-web
          set +a

          # Patrol web runs ONE target file per invocation — it does not
          # enumerate the whole suite when --target is omitted (that yields
          # "Total: 0"). So run the given target, or every *_test.dart file in
          # turn, and aggregate. Patrol web also exits 0 even when a test fails,
          # so the status is derived from the printed summary.
          if [ -n "$PATROL_TEST_TARGET" ]; then
            mapfile -t TARGETS <<< "$PATROL_TEST_TARGET"
          else
            mapfile -t TARGETS < <(find integration_test/tests -name '*_test.dart' | sort)
          fi
          echo "Running ${#TARGETS[@]} Patrol web target(s)."

          run_one() {
            patrol test \
              --device chrome \
              --web-headless=true \
              --web-timeout 300000 \
              --target "$1" \
              --dart-define=PATROL_WEB=true \
              --dart-define=MATRIX_URL="$MATRIX_URL" \
              --dart-define=SERVER_URL="$SERVER_URL" \
              --dart-define=USERNAME="$TEST_USERNAME" \
              --dart-define=PASSWORD="$TEST_PASSWORD" \
              --dart-define=Receiver="$Receiver" \
              --dart-define=ReceiverPass="$ReceiverPass" \
              --dart-define=CurrentAccount="$CurrentAccount" \
              --dart-define=MemberMatrixID="$MemberMatrixID" \
              --dart-define=SearchByMatrixAddress="$SearchByMatrixAddress" \
              --dart-define=SearchByTitle="$SearchByTitle" \
              --dart-define=TitleOfGroupTest="$TitleOfGroupTest" \
              --dart-define=GroupID="$GroupID" \
              2>&1 | tee /tmp/patrol-web.log
            # Green only when the summary reports zero failures (a file whose
            # tests are all mobileOnly-skipped is still green). A missing
            # summary line (crash / build error) counts as a failure.
            grep -qE '^❌ Failed: 0$' /tmp/patrol-web.log
          }

          overall=0
          FAILED=()
          for t in "${TARGETS[@]}"; do
            echo "::group::Patrol Web — $t"
            if run_one "$t"; then
              echo "PASS: $t"
            else
              echo "FAIL: $t"
              overall=1
              FAILED+=("$t")
            fi
            echo "::endgroup::"
          done

          if [ "$overall" -ne 0 ]; then
            echo "::error::Patrol web failures in: ${FAILED[*]}"
          fi
          exit "$overall"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload failure traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Tear down Synapse
        if: always()
        run: docker rm -f synapse || true
