name: Patrol Web Integration Tests

on:
  # PR trigger disabled until all web integration tests are green.
  # Re-enable the `pull_request` block below once SSH git deps are
  # migrated to HTTPS and the test suite is stable.
  #
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "lib/**"
  #     - "integration_test/**"
  #     - "pubspec.yaml"
  #     - "pubspec.lock"
  #     - ".github/workflows/patrol-web-integration-test.yaml"
  workflow_dispatch:
    inputs:
      patrol_test_target:
        description: "Optional path to a single Patrol integration test Dart file. Leave empty to run the whole suite."
        required: false
        default: ""

jobs:
  patrol-web:
    name: Patrol Web (Chrome headless)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    env:
      FLUTTER_VERSION: "3.38.9"
      PATROL_CLI_VERSION: "4.3.1"
      SYNAPSE_URL: http://localhost
      SERVER_NAME: localhost

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Start Synapse (Docker)
        run: ./scripts/integration-server-synapse.sh

      - name: Provision fixtures
        id: fixtures
        run: |
          ./scripts/integration-test-provision-synapse.sh > .env.patrol-web
          # Log variable names without values (passwords are throwaway but
          # no reason to leak them in CI logs).
          cut -d= -f1 .env.patrol-web

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          dart pub global activate patrol_cli ${{ env.PATROL_CLI_VERSION }}

      - name: Install Playwright browsers
        run: |
          # patrol_cli runs `npx playwright install` (without --with-deps) in
          # its internal web_runner directory.  ubuntu-24.04 runner images >=
          # 20260615.205.1 dropped the pre-installed Chromium, so system libs
          # (libnss3, libatk, etc.) are missing and the install silently exits
          # with code 1.  Pre-running with --with-deps here installs both the
          # browser binary and the required OS packages; patrol's subsequent
          # install is a no-op because ~/.cache/ms-playwright already has it.
          npx playwright@1.56.0 install --with-deps chromium

      - name: Run Patrol Web
        timeout-minutes: 20
        env:
          PATROL_TEST_TARGET: ${{ inputs.patrol_test_target }}
        run: |
          TARGET_FLAG=()
          if [ -n "$PATROL_TEST_TARGET" ]; then
            TARGET_FLAG=(--target "$PATROL_TEST_TARGET")
          fi
          # shellcheck disable=SC1091
          set -a
          . ./.env.patrol-web
          set +a
          patrol test \
            --device chrome \
            --web-headless=true \
            --web-timeout 300000 \
            "${TARGET_FLAG[@]}" \
            --dart-define=PATROL_WEB=true \
            --dart-define=MATRIX_URL="$MATRIX_URL" \
            --dart-define=SERVER_URL="$SERVER_URL" \
            --dart-define=USERNAME="$TEST_USERNAME" \
            --dart-define=PASSWORD="$TEST_PASSWORD" \
            --dart-define=Receiver="$Receiver" \
            --dart-define=ReceiverPass="$ReceiverPass" \
            --dart-define=CurrentAccount="$CurrentAccount" \
            --dart-define=MemberMatrixID="$MemberMatrixID" \
            --dart-define=SearchByMatrixAddress="$SearchByMatrixAddress" \
            --dart-define=SearchByTitle="$SearchByTitle" \
            --dart-define=TitleOfGroupTest="$TitleOfGroupTest" \
            --dart-define=GroupID="$GroupID"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload failure traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Tear down Synapse
        if: always()
        run: docker rm -f synapse || true
